name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          cat > .env.production << EOF
          VITE_API_URL=https://emedosmotr-map.kz/api
          VITE_WS_URL=wss://emedosmotr-map.kz/ws
          VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}
          VITE_VAPID_PUBLIC_KEY=${{ secrets.VITE_VAPID_PUBLIC_KEY }}
          VITE_YANDEX_MAPS_KEY=${{ secrets.VITE_YANDEX_MAPS_KEY }}
          EOF
          npm ci
          npm run build

      - name: Pull latest code on server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            if [ -d "/home/administrator/emedosmotr-map/.git" ]; then
              cd /home/administrator/emedosmotr-map
              git fetch origin main
              git reset --hard origin/main
            else
              git clone https://github.com/NurlanOmarov/emedosmotr-map.git /home/administrator/emedosmotr-map
            fi
            mkdir -p /home/administrator/emedosmotr-map/frontend/dist

      - name: Copy frontend dist to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "frontend/dist/"
          target: "/home/administrator/emedosmotr-map/frontend/"

      - name: Start containers and run migrations
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd /home/administrator/emedosmotr-map

            docker compose -f docker-compose.prod.yml up -d --build --remove-orphans
            docker compose -f docker-compose.prod.yml exec -T backend alembic upgrade head
            docker image prune -f

            echo "Deploy completed at $(date)"
