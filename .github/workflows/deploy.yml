name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          cat > .env.production << EOF
          VITE_API_URL=https://emedosmotr-map.kz/api
          VITE_WS_URL=wss://emedosmotr-map.kz/ws
          VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}
          VITE_VAPID_PUBLIC_KEY=${{ secrets.VITE_VAPID_PUBLIC_KEY }}
          VITE_YANDEX_MAPS_KEY=${{ secrets.VITE_YANDEX_MAPS_KEY }}
          EOF
          npm ci
          npm run build

      - name: Pull latest code + clean old dist on server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            if [ -d "/home/administrator/emedosmotr-map/.git" ]; then
              cd /home/administrator/emedosmotr-map
              git fetch origin main
              git reset --hard origin/main
            else
              git clone https://github.com/NurlanOmarov/emedosmotr-map.git /home/administrator/emedosmotr-map
            fi
            # WIPE old dist completely — scp does not delete removed files
            # and a stale layout was leaving the prod with month-old assets.
            rm -rf /home/administrator/emedosmotr-map/frontend/dist
            mkdir -p /home/administrator/emedosmotr-map/frontend/dist
            echo "=== Pre-scp state ==="
            ls -la /home/administrator/emedosmotr-map/frontend/dist/

      - name: Pack frontend dist
        run: |
          cd frontend
          tar -czf dist.tar.gz dist/
          ls -lh dist.tar.gz
          # Show what's actually inside for debugging
          tar -tzf dist.tar.gz | head -10

      - name: Copy frontend dist tarball to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "frontend/dist.tar.gz"
          target: "/home/administrator/emedosmotr-map/"

      - name: Extract dist on server + verify
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd /home/administrator/emedosmotr-map
            # appleboy/scp uploads to {target}/{source-dir-name}/{file}, so the tarball is at frontend/dist.tar.gz
            TARBALL=$(find . -name dist.tar.gz -newer /tmp 2>/dev/null | head -1)
            [ -z "$TARBALL" ] && TARBALL=$(find . -name dist.tar.gz | head -1)
            echo "Tarball location: $TARBALL"
            ls -la "$TARBALL"
            tar -xzf "$TARBALL" -C frontend/ --overwrite
            rm -f "$TARBALL"
            echo "=== Post-extract state ==="
            ls -la frontend/dist/ | head -5
            echo "=== index.html date ==="
            stat frontend/dist/index.html
            echo "=== Verify new code is in bundle ==="
            grep -l "controllerchange" frontend/dist/assets/*.js | head -1 || echo "WARN: controllerchange not found"
            grep -o "skipWaiting\|geo/regions" frontend/dist/sw.js | sort -u || echo "WARN: SW symbols not found"

      - name: Start containers and run migrations
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd /home/administrator/emedosmotr-map

            docker compose -f docker-compose.prod.yml up -d --build --remove-orphans
            docker compose -f docker-compose.prod.yml exec -T backend alembic upgrade head

            # Invalidate geo cache on every deploy (schema or data may have changed)
            docker compose -f docker-compose.prod.yml exec -T redis redis-cli DEL "geo:regions:with_geometry" || true

            # Seed geo data if any expected region is missing
            EXPECTED_CODES="'astana_region','almaty_city','shymkent_region','abairjay_region'"
            MISSING=$(docker compose -f docker-compose.prod.yml exec -T postgres psql -U postgres -d emedosmotr_map -tAc \
              "SELECT COUNT(*) FROM regions WHERE code IN ($EXPECTED_CODES);" | tr -d '[:space:]')
            if [ "$MISSING" != "4" ]; then
              echo "Seeding geo data (found $MISSING/4 expected regions)..."
              docker compose -f docker-compose.prod.yml exec -T backend sh -c 'PYTHONPATH=/app python scripts/seed_geo.py'
              # Invalidate Redis geo cache so new regions appear immediately
              docker compose -f docker-compose.prod.yml exec -T redis redis-cli DEL "geo:regions:with_geometry" || true
            fi

            docker image prune -f

            # Reload nginx so it re-resolves backend IP after container rebuild
            sleep 5
            docker compose -f docker-compose.prod.yml exec -T nginx nginx -s reload

            echo "Deploy completed at $(date)"
