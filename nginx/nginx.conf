worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log  /var/log/nginx/access.log;
    error_log   /var/log/nginx/error.log;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/javascript;

    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    server {
        listen 80;
        server_name _;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(self)" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Docker internal DNS — dynamic re-resolution on each request
        resolver 127.0.0.11 valid=10s ipv6=off;

        # Service worker files — never cache.
        # Use exact-match (location =) which beats any regex location in nginx priority,
        # otherwise the broader .js regex below was overriding and serving sw.js with max-age=1y.
        location = /sw.js {
            root /usr/share/nginx/html;
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            add_header Service-Worker-Allowed "/";
        }
        location = /registerSW.js {
            root /usr/share/nginx/html;
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
        location = /manifest.webmanifest {
            root /usr/share/nginx/html;
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        # Static assets — cache aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|woff|woff2|ttf|svg|webp)$ {
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # index.html — no cache
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # IMPORTANT: proxy_pass uses a variable ($backend_upstream) so Docker DNS
        # is re-resolved on every request (needed when the backend container is
        # restarted). When a variable is used, nginx ignores the URI part of
        # proxy_pass — so we MUST NOT append /api/ etc. and rely on the original
        # request URI being forwarded as-is. Appending a path caused backend to
        # receive a truncated URI (e.g. "/api/" instead of "/api/geo/settlements").

        # Auth (stricter rate limit)
        location /api/auth/ {
            limit_req zone=auth burst=3 nodelay;
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Geo API — region boundaries.
        # 'no-cache' means: store the response, but ALWAYS revalidate with the
        # server before using it. Backend responds 304 (no body) when ETag
        # matches, so the bandwidth cost is the same as a real cache hit while
        # is_connected/engineer edits propagate immediately. max-age=N would
        # serve stale data for N seconds even after a region update.
        location /api/geo/regions {
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header If-None-Match $http_if_none_match;
            proxy_hide_header Cache-Control;
            add_header Cache-Control "no-cache, must-revalidate" always;
        }

        # Backend API
        location /api/ {
            limit_req zone=api burst=10 nodelay;
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health checks
        location ~ ^/(health|ready)$ {
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
        }

        # WebSockets
        location /ws/ {
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }
    }
}
