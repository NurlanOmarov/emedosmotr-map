worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log  /var/log/nginx/access.log;
    error_log   /var/log/nginx/error.log;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/javascript;

    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    server {
        listen 80;
        server_name _;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(self)" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Docker internal DNS — dynamic re-resolution on each request
        resolver 127.0.0.11 valid=10s ipv6=off;

        # Static assets — cache aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|woff|woff2|ttf|svg|webp)$ {
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # index.html — no cache
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # Auth (stricter rate limit)
        location /api/auth/ {
            limit_req zone=auth burst=3 nodelay;
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream/api/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }


        # Geo API — cacheable region boundaries
        location /api/geo/regions {
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream/api/geo/regions;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header If-None-Match $http_if_none_match;
            proxy_hide_header Cache-Control;
            add_header Cache-Control "public, max-age=300, stale-while-revalidate=3600";
        }

        # Backend API
        location /api/ {
            limit_req zone=api burst=10 nodelay;
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health checks
        location ~ ^/(health|ready)$ {
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream/$1;
            proxy_set_header Host $host;
        }

        # WebSockets
        location /ws/ {
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }
    }
}
